# =============================================================================
# SLAM Toolbox Parameters for Large-Scale Asynchronous Mapping
# =============================================================================
slam_toolbox:
  ros__parameters:

    # --- Task Settings ---
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping # mapping or localization

    # --- LiDAR Settings ---
    max_laser_range: 12.0
    minimum_time_interval: 0.1
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000 # Increase for large maps

    # --- Matcher Settings ---
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.05
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 10.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # --- Correlation Settings (Scan Matching) ---
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # --- Correlation Settings (Loop Closure) ---
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # --- Optimizer Settings ---
    # Used for Pose Graph Optimization
    optimization_step_treshold: 5
    minimum_note_distance: 0.2
    search_space_dimension: 10.0
    search_space_resolution: 0.05
    full_graph_optimization_step_treshold: 10

    # --- General Settings ---
    use_tf_scan_transformation: true
    use_tf_pose_start_estimate: false
    map_update_interval: 2.0
    resolution: 0.05
    max_condition_number: 1e9
    max_distance_to_free_space: 2.0
    map_file_name: college_floor_map
    map_start_pose: [0.0, 0.0, 0.0]
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02 # 50Hz
    generate_poses_interval: 0.2
    graphics_optimization_step_treshold: 1
